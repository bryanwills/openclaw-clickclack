name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24"
  PNPM_VERSION: "11.0.7"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check gofmt
        run: |
          files="$(gofmt -l apps/api)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Coverage gate
        run: bash scripts/check-go-coverage.sh

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript formatting
        run: pnpm fmt:ts:check

      - name: Lint TypeScript
        run: pnpm lint

      - name: Typecheck root tests
        run: pnpm typecheck

      - name: Typecheck workspaces
        run: pnpm -r typecheck

      - name: Verify embedded app build is current and repeatable
        run: |
          pnpm build
          git diff --exit-code -- apps/api/internal/webassets/dist
          pnpm build
          git diff --exit-code -- apps/api/internal/webassets/dist

      - name: Build docs site
        run: pnpm docs:site

  e2e:
    name: Playwright E2E
    needs:
      - go
      - typescript
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 20
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Go modules
        run: go mod download

      - name: Run e2e tests
        run: pnpm test:e2e

  docker:
    name: Docker Image
    needs:
      - go
      - typescript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t clickclack:ci .
